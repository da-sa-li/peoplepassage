# PeoplePassage MQTT-Broker
# Die Passwortdatei wird beim Container-Start aus MQTT_USERNAME/MQTT_PASSWORD
# erzeugt (siehe mosquitto/entrypoint.sh).

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
log_type information
