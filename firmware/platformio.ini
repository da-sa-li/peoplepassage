; PlatformIO-Projekt für die PeoplePassage-Türsensoren (ESP32 + VL53L1X).
; Build/Flash:  cd firmware && pio run -t upload && pio device monitor
;
; Vor dem ersten Build: src/config.h aus src/config.h.example erstellen und
; WLAN-/MQTT-/Sensor-Werte eintragen.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sparkfun/SparkFun VL53L1X 4m Laser Distance Sensor @ ^1.2.12
    knolleary/PubSubClient @ ^2.8
build_flags =
    ; PubSubClient-Puffer leicht erhöhen (Status-Payload + Headroom)
    -DMQTT_MAX_PACKET_SIZE=256
